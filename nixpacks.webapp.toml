[phases.setup]
nixPkgs = ["nodejs_20", "ffmpeg", "pkg-config", "python3"]

[phases.install]
cmds = [
  "npm ci --omit=dev --omit=optional --ignore-scripts || npm install --omit=dev --omit=optional --ignore-scripts",
  "cd api && npm ci --omit=dev || npm install --omit=dev",
  "cd frontend && npm ci --omit=dev || npm install --omit=dev"
]

[phases.build]
cmds = [
  "cd frontend && npm run build"
]

[start]
cmd = "NODE_ENV=production node api/server.js"
