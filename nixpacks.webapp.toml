[phases.setup]
nixPkgs = ["nodejs_22", "ffmpeg", "vips"]

[phases.install]
cmds = [
  "echo '=== Verifying ffmpeg installation ==='",
  "which ffmpeg || echo 'WARNING: ffmpeg not found in PATH'",
  "which ffprobe || echo 'WARNING: ffprobe not found in PATH'",
  "find /nix/store -name ffprobe -type f 2>/dev/null | head -5 || echo 'No ffprobe in /nix/store'",
  "ffmpeg -version 2>&1 | head -3 || echo 'WARNING: ffmpeg not executable'",
  "ffprobe -version 2>&1 | head -3 || echo 'WARNING: ffprobe not executable'",
  "echo '=== Installing npm dependencies ==='",
  "npm install --prefer-offline --no-audit --no-fund",
  "cd api && npm install --prefer-offline --no-audit --no-fund",
  "cd frontend && npm install --prefer-offline --no-audit --no-fund --legacy-peer-deps"
]

[phases.build]
cmds = [
  "echo '=== Building frontend ==='",
  "cd frontend && NODE_ENV=production npm run build",
  "echo '=== Checking if dist was created ==='",
  "ls -la frontend/dist || echo 'ERROR: frontend/dist not found!'",
  "echo '=== Build phase complete ==='"
]

[start]
cmd = "NODE_ENV=production node --max-old-space-size=400 --expose-gc api/server.js"
