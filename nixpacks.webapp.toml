[phases.setup]
nixPkgs = ["nodejs_22", "ffmpeg", "vips"]

[phases.install]
cmds = [
  "npm install --prefer-offline --no-audit --no-fund",
  "cd api && npm install --prefer-offline --no-audit --no-fund",
  "cd frontend && npm install --prefer-offline --no-audit --no-fund --legacy-peer-deps"
]

[phases.build]
cmds = [
  "cd frontend && NODE_ENV=production npm run build"
]

[start]
cmd = "NODE_ENV=production node api/server.js"
