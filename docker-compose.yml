
services:

  app:
    build: .
    image: speak-shine-app:latest
    container_name: speak-shine-app

    restart: always

    env_file:
      - .env

    ports:
      - "3001:3001"

    depends_on:
      - mongodb

    # Docker-native health check — used by the deploy script to gate traffic switch.
    # Starts checking after 20s (warm-up), then every 10s, 3 retries before "unhealthy".
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

    networks:
      - speakshine-network

  mongodb:
    image: mongo:7

    container_name: speak-shine-mongodb

    restart: always

    ports:
      - "27017:27017"

    volumes:
      - mongodb_data:/data/db

    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

    networks:
      - speakshine-network

  nginx:
    image: nginx:latest

    container_name: speak-shine-nginx

    restart: always

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/maintenance.html:/usr/share/nginx/html/maintenance.html
      - /etc/letsencrypt:/etc/letsencrypt

    depends_on:
      - app

    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

    networks:
      - speakshine-network

volumes:
  mongodb_data:

networks:
  speakshine-network:
