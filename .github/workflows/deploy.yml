name: Speak-Shine Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: speak-shine-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4.2.2

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        env:
          ENV_FILE_CONTENT: ${{ secrets.ENV_FILE_CONTENT }}
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          envs: ENV_FILE_CONTENT
          command_timeout: 15m
          script: |
            set -euo pipefail

            APP_DIR="${{ secrets.APP_DIR }}"
            if [ -z "$APP_DIR" ]; then
              APP_DIR="$HOME/Speak-Shine-"
            fi

            cd "$APP_DIR"

            # ── 1. Sync source ────────────────────────────────────────────────
            echo "=== [1/6] Syncing source ==="
            git fetch origin main
            git reset --hard origin/main

            # ── 2. Write .env ─────────────────────────────────────────────────
            echo "=== [2/6] Writing .env ==="
            if [ -n "${ENV_FILE_CONTENT:-}" ]; then
              printf '%s' "$ENV_FILE_CONTENT" > .env
              echo "✓ .env written from secret"
            elif command -v infisical &>/dev/null; then
              if infisical export --env=production --format=dotenv >/tmp/.env.tmp 2>/dev/null \
                  && grep -q "JWT_SECRET" /tmp/.env.tmp; then
                mv /tmp/.env.tmp .env
                echo "✓ .env written from Infisical"
              else
                rm -f /tmp/.env.tmp
                echo "⚠ Infisical failed — keeping existing .env"
              fi
            fi
            if [ ! -f .env ] || ! grep -q "JWT_SECRET" .env; then
              echo "❌ FATAL: .env missing or incomplete"
              exit 1
            fi

            # ── 3. Clean up any leftover candidate containers ─────────────────
            echo "=== [3/6] Cleanup stale containers ==="
            docker rm -f speak-shine-app-candidate 2>/dev/null || true
            echo "✓ Cleaned"

            # ── 4. Save rollback image ────────────────────────────────────────
            echo "=== [4/6] Save rollback image ==="
            CURRENT_IMG="$(docker inspect --format='{{.Image}}' speak-shine-app 2>/dev/null || true)"
            if [ -n "$CURRENT_IMG" ]; then
              docker tag "$CURRENT_IMG" speak-shine-app:rollback
              echo "✓ Rollback saved"
            else
              echo "⚠ No running container — first deploy"
            fi

            # ── 5. Build new image ────────────────────────────────────────────
            echo "=== [5/6] Building new image ==="
            docker compose build --no-cache app
            echo "✓ Build complete"

            # ── 6. Swap — docker compose recreates the app container ──────────
            # This is the only moment of downtime (~2-3 seconds).
            # Nginx serves the maintenance.html during this window.
            # docker compose up --force-recreate stops old → starts new atomically.
            echo "=== [6/6] Swapping app container ==="
            docker compose up -d --force-recreate --remove-orphans app

            # Wait for health
            echo "Waiting for health check…"
            HEALTHY=false
            for i in $(seq 1 30); do
              if curl -fsS http://localhost:3001/api/health >/dev/null 2>&1; then
                HEALTHY=true
                echo "✓ Health check passed (attempt $i)"
                break
              fi
              echo "  Attempt $i/30…"
              sleep 3
            done

            if [ "$HEALTHY" = "false" ]; then
              echo "❌ App failed health check — rolling back"
              docker compose logs --tail=100 app

              # Rollback: restore previous image and restart
              if docker image inspect speak-shine-app:rollback >/dev/null 2>&1; then
                docker tag speak-shine-app:rollback speak-shine-app:latest
                docker compose up -d --force-recreate app
                echo "✓ Rolled back to previous version"
              fi
              exit 1
            fi

            # Reload Nginx to pick up updated config (maintenance page volume, etc.)
            docker exec speak-shine-nginx nginx -s reload 2>/dev/null && \
              echo "✓ Nginx reloaded" || true

            # ── Status & Cleanup ──────────────────────────────────────────────
            echo "=== Status ==="
            docker compose ps

            echo "=== Cleanup ==="
            docker image rm speak-shine-app:rollback 2>/dev/null || true
            docker image prune -f || true
            docker builder prune -af || true

            echo ""
            echo "🚀 Deployment complete"
