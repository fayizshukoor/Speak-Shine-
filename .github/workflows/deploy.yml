name: Speak-Shine Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: speak-shine-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -euo pipefail

            APP_DIR="${{ secrets.APP_DIR }}"
            if [ -z "$APP_DIR" ]; then
              APP_DIR="$HOME/Speak-Shine-"
            fi

            cd "$APP_DIR"

            echo "================================="
            echo "Sync latest source"
            echo "================================="
            git fetch origin main
            git reset --hard origin/main

            echo "================================="
            echo "Pull environment variables from Infisical"
            echo "================================="
            # Try Infisical first; fall back to existing .env on any failure
            # (expired session, network issue, etc.)
            if command -v infisical &> /dev/null; then
              echo "Infisical CLI found, attempting to pull production secrets..."
              if infisical export --env=production --format=dotenv > .env.infisical 2>/dev/null; then
                mv .env.infisical .env
                echo "✓ Environment variables synced from Infisical"
              else
                rm -f .env.infisical
                echo "⚠ Infisical export failed (session expired?) — using existing .env file"
                if [ ! -f .env ]; then
                  echo "❌ Error: No .env file found and Infisical export failed"
                  exit 1
                fi
              fi
            else
              echo "⚠ Infisical CLI not found, using existing .env file"
              if [ ! -f .env ]; then
                echo "❌ Error: No .env file found and Infisical is not installed"
                exit 1
              fi
            fi

            echo "================================="
            echo "Backup compose file"
            echo "================================="
            cp docker-compose.yml docker-compose.backup.yml

            echo "================================="
            echo "Save rollback image"
            echo "================================="
            PREVIOUS_APP_IMAGE="$(docker inspect --format='{{.Image}}' speak-shine-app 2>/dev/null || true)"
            if [ -n "$PREVIOUS_APP_IMAGE" ]; then
              docker tag "$PREVIOUS_APP_IMAGE" speak-shine-app:rollback
              echo "Rollback image saved: $PREVIOUS_APP_IMAGE"
            else
              echo "No previous app container found; rollback image unavailable"
            fi

            echo "================================="
            echo "Build fresh app image"
            echo "================================="
            docker compose build --no-cache app

            echo "================================="
            echo "Restart app and nginx"
            echo "================================="
            docker compose up -d --force-recreate --remove-orphans app nginx

            echo "================================="
            echo "Wait for app health"
            echo "================================="
            for i in $(seq 1 30); do
              if curl -fsS http://localhost:3001/api/health >/dev/null; then
                echo "Health check passed"
                break
              fi

              if [ "$i" -eq 30 ]; then
                echo "Health check failed"
                docker compose ps
                docker compose logs --tail=150 app

                echo "================================="
                echo "Rolling back compose file"
                echo "================================="
                cp docker-compose.backup.yml docker-compose.yml

                if docker image inspect speak-shine-app:rollback >/dev/null 2>&1; then
                  echo "Restoring previous app image"
                  docker tag speak-shine-app:rollback speak-shine-app:latest
                else
                  echo "No rollback image available"
                fi

                docker compose up -d --force-recreate app nginx
                exit 1
              fi

              sleep 5
            done

            echo "================================="
            echo "Deployment status"
            echo "================================="
            docker compose ps
            docker system df

            echo "================================="
            echo "Cleanup unused images only"
            echo "================================="
            docker image rm speak-shine-app:rollback >/dev/null 2>&1 || true
            docker image prune -f || true
            docker builder prune -af || true

            echo "Deployment completed"
