name: Speak-Shine Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: speak-shine-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4.2.2

      - name: Deploy to EC2 (zero-downtime)
        uses: appleboy/ssh-action@master
        env:
          ENV_FILE_CONTENT: ${{ secrets.ENV_FILE_CONTENT }}
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          envs: ENV_FILE_CONTENT
          # Give the full deploy enough time (build can take ~5 min on small EC2)
          command_timeout: 15m
          script: |
            set -euo pipefail

            APP_DIR="${{ secrets.APP_DIR }}"
            if [ -z "$APP_DIR" ]; then
              APP_DIR="$HOME/Speak-Shine-"
            fi

            cd "$APP_DIR"

            # ── 1. Sync latest source ─────────────────────────────────────────
            echo "=== [1/7] Syncing source ==="
            git fetch origin main
            git reset --hard origin/main

            # ── 2. Write environment variables ───────────────────────────────
            echo "=== [2/7] Writing .env ==="
            if [ -n "${ENV_FILE_CONTENT:-}" ]; then
              printf '%s' "$ENV_FILE_CONTENT" > .env
              echo "✓ .env written from ENV_FILE_CONTENT secret"
            elif command -v infisical &> /dev/null; then
              echo "Trying Infisical..."
              if infisical export --env=production --format=dotenv > /tmp/.env.tmp 2>/dev/null \
                  && [ -s /tmp/.env.tmp ] \
                  && grep -q "JWT_SECRET" /tmp/.env.tmp; then
                mv /tmp/.env.tmp .env
                echo "✓ .env written from Infisical"
              else
                rm -f /tmp/.env.tmp
                echo "⚠ Infisical export failed — keeping existing .env"
              fi
            fi
            if [ ! -f .env ] || ! grep -q "JWT_SECRET" .env; then
              echo "❌ FATAL: .env is missing or does not contain JWT_SECRET"
              exit 1
            fi

            # ── 3. Save rollback image (tag current live image before anything changes) ──
            echo "=== [3/7] Saving rollback image ==="
            ROLLBACK_SAVED=false
            CURRENT_IMAGE="$(docker inspect --format='{{.Image}}' speak-shine-app 2>/dev/null || true)"
            if [ -n "$CURRENT_IMAGE" ]; then
              docker tag "$CURRENT_IMAGE" speak-shine-app:rollback
              ROLLBACK_SAVED=true
              echo "✓ Rollback image saved: ${CURRENT_IMAGE:0:20}…"
            else
              echo "⚠ No running container found — first deploy or previous deploy failed"
            fi

            # ── 4. Build new image ────────────────────────────────────────────
            echo "=== [4/7] Building new image ==="
            # Build into a temporary tag so the live :latest tag is untouched until
            # the new container passes health checks.
            docker build --no-cache -t speak-shine-app:candidate .
            echo "✓ New image built as speak-shine-app:candidate"

            # ── 5. Start new container alongside the old one ──────────────────
            echo "=== [5/7] Starting candidate container ==="
            # Ensure the Docker network exists (created by docker compose on first run,
            # but may be absent on a fresh server before any compose up).
            docker network create speakshine-network 2>/dev/null || true
            # Run the candidate on port 3002 (internal only — Nginx still hits 3001).
            docker rm -f speak-shine-app-candidate 2>/dev/null || true
            docker run -d \
              --name speak-shine-app-candidate \
              --network speakshine-network \
              --env-file .env \
              --health-cmd "curl -fsS http://localhost:3001/api/health" \
              --health-interval 10s \
              --health-timeout 5s \
              --health-retries 5 \
              --health-start-period 20s \
              --restart no \
              -p 3002:3001 \
              speak-shine-app:candidate
            echo "✓ Candidate container started on port 3002 (internal health gate)"

            # ── 6. Wait for candidate to become healthy ───────────────────────
            echo "=== [6/7] Health-gating candidate container ==="
            HEALTHY=false
            for i in $(seq 1 36); do
              STATUS="$(docker inspect --format='{{.State.Health.Status}}' speak-shine-app-candidate 2>/dev/null || echo 'missing')"
              echo "  Attempt $i/36 — health status: $STATUS"

              if [ "$STATUS" = "healthy" ]; then
                HEALTHY=true
                echo "✓ Candidate is healthy!"
                break
              fi

              if [ "$STATUS" = "unhealthy" ]; then
                echo "❌ Candidate container is unhealthy"
                break
              fi

              sleep 5
            done

            if [ "$HEALTHY" = "false" ]; then
              echo "❌ Candidate failed to become healthy — aborting deploy"
              echo ""
              echo "=== Candidate logs (last 80 lines) ==="
              docker logs --tail=80 speak-shine-app-candidate || true
              docker rm -f speak-shine-app-candidate || true

              # Old container is still running — nothing to roll back
              echo ""
              echo "✓ Previous version is still serving traffic (no downtime)"
              exit 1
            fi

            # ── 7. Zero-downtime cutover ──────────────────────────────────────
            echo "=== [7/7] Zero-downtime cutover ==="

            # a. Tag candidate as the new :latest
            docker tag speak-shine-app:candidate speak-shine-app:latest

            # b. Stop & remove the OLD app container (if it still exists — may be absent on first deploy)
            OLD_APP_ID="$(docker inspect --format='{{.Id}}' speak-shine-app 2>/dev/null || true)"
            CANDIDATE_ID="$(docker inspect --format='{{.Id}}' speak-shine-app-candidate 2>/dev/null || true)"

            # Only stop the old container if it is NOT the candidate
            # (on first deploy speak-shine-app may not exist at all)
            if [ -n "$OLD_APP_ID" ] && [ "$OLD_APP_ID" != "$CANDIDATE_ID" ]; then
              echo "Stopping old container ($( echo $OLD_APP_ID | head -c 12 )…)"
              docker stop speak-shine-app  2>/dev/null || true
              docker rm   speak-shine-app  2>/dev/null || true
            fi

            # c. Rename candidate → speak-shine-app
            docker rename speak-shine-app-candidate speak-shine-app
            echo "✓ Container renamed to speak-shine-app"

            # d. Update restart policy so it survives reboots
            docker update --restart always speak-shine-app

            # e. Reload Nginx — picks up new upstream without dropping connections
            #    Try exec first (fastest); fall back to restart if exec fails
            if docker exec speak-shine-nginx nginx -t 2>/dev/null; then
              docker exec speak-shine-nginx nginx -s reload
              echo "✓ Nginx reloaded (zero dropped connections)"
            else
              echo "⚠ Nginx config test failed — restarting nginx container"
              docker compose restart nginx
            fi

            echo "✓ Cutover complete — speak-shine-app is now the candidate"
            echo ""

            # ── Final validation ──────────────────────────────────────────────
            echo "=== Final health check ==="
            sleep 3
            if curl -fsS http://localhost:3001/api/health > /dev/null; then
              echo "✓ Production health check passed"
            else
              echo "⚠ Post-cutover health check failed — check container logs"
              docker logs --tail=50 speak-shine-app || true
            fi

            # ── Cleanup ───────────────────────────────────────────────────────
            echo "=== Cleanup ==="
            docker image rm speak-shine-app:candidate  2>/dev/null || true
            docker image rm speak-shine-app:rollback   2>/dev/null || true
            docker image prune -f  || true
            docker builder prune -af || true

            echo ""
            docker compose ps
            echo ""
            echo "🚀 Deployment complete — zero downtime achieved"
