<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speak &amp; Shine — Updating</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #05050f;
      color: #f0f0ff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: linear-gradient(135deg, #1a1a2e 0%, #0f0f23 100%);
      border: 1px solid rgba(124, 111, 255, 0.25);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      text-align: center;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }
    .icon { font-size: 3.5rem; margin-bottom: 1.25rem; }
    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: 0.75rem;
    }
    p {
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.95rem;
      line-height: 1.7;
      margin-bottom: 2rem;
    }
    .spinner-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 2rem;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 3px solid rgba(124, 111, 255, 0.2);
      border-top-color: #7c6fff;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .badge {
      display: inline-block;
      background: rgba(124, 111, 255, 0.12);
      border: 1px solid rgba(124, 111, 255, 0.3);
      color: #a78bfa;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.35rem 0.85rem;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .retry {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.35);
    }
  </style>
  <!-- Auto-refresh every 15 seconds so users get back in automatically -->
  <meta http-equiv="refresh" content="15" />
</head>
<body>
  <div class="card">
    <div class="icon">🚀</div>
    <h1>We're updating Speak &amp; Shine</h1>
    <p>
      We're deploying a new version. This usually takes less than a minute.<br />
      The page will refresh automatically.
    </p>
    <div class="spinner-wrap">
      <div class="spinner"></div>
    </div>
    <div class="badge">⚡ Back in a moment</div>
    <div class="retry">Auto-refreshing in 15 seconds…</div>
  </div>
</body>
</html>
