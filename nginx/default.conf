upstream speak_shine_app {
    server app:3001 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

server {
    listen 443 ssl;
    server_name speak-shine.sidhartht.online;

    ssl_certificate     /etc/letsencrypt/live/speak-shine.sidhartht.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/speak-shine.sidhartht.online/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /usr/share/nginx/html;

    # Serve maintenance page when upstream is down
    error_page 502 503 504 /maintenance.html;
    location = /maintenance.html {
        internal;
        add_header Cache-Control "no-store" always;
    }

    location / {
        proxy_pass         http://speak_shine_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 120m;
        proxy_read_timeout   300s;
        proxy_send_timeout   300s;
        proxy_connect_timeout 10s;
        proxy_intercept_errors on;
    }
}

server {
    listen 80;
    server_name speak-shine.sidhartht.online;
    return 301 https://$host$request_uri;
}
