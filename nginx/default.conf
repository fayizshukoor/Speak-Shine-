# ── Upstream pool ────────────────────────────────────────────────────────────
# Single backend — Nginx will serve the maintenance page if it is unreachable.
upstream speak_shine_app {
    server app:3001;

    # Mark backend down after 3 failed attempts in 10 s; retry after 10 s.
    max_fails=3 fail_timeout=10s;

    # Keep up to 32 idle connections alive to avoid per-request TCP handshakes.
    keepalive 32;
}

# ── HTTPS server ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name speak-shine.sidhartht.online;

    ssl_certificate     /etc/letsencrypt/live/speak-shine.sidhartht.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/speak-shine.sidhartht.online/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Maintenance page (served by Nginx itself — no app needed) ─────────────
    # Nginx looks here when the upstream is down (502/503/504).
    root /usr/share/nginx/html;
    error_page 502 503 504 /maintenance.html;
    location = /maintenance.html {
        internal;
        add_header Cache-Control "no-store" always;
        add_header Retry-After   "30"       always;
    }

    # ── Health check endpoint — bypass maintenance page ───────────────────────
    # Lets our deploy script poll /api/health even while the app is warming up.
    location = /api/health {
        proxy_pass         http://speak_shine_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 3s;
        proxy_read_timeout    5s;
        # Do NOT intercept errors here — return real status to the deploy script.
    }

    # ── All other traffic ─────────────────────────────────────────────────────
    location / {
        proxy_pass         http://speak_shine_app;
        proxy_http_version 1.1;

        # WebSocket support (Socket.io)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        client_max_body_size 120m;
        proxy_read_timeout   300s;
        proxy_send_timeout   300s;
        proxy_connect_timeout 10s;

        # When the app is down, show the maintenance page instead of 502/504.
        proxy_intercept_errors on;
    }
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name speak-shine.sidhartht.online;
    return 301 https://$host$request_uri;
}
