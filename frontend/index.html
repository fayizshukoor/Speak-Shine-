<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json?v=2" />
    <meta name="theme-color" content="#7c6fff" />
    <meta name="description" content="Daily speaking challenges to build fluency and confidence" />

    <!-- Android -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Speak &amp; Shine" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png?v=2" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png?v=2" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144.png?v=2" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/icons/icon-192.png?v=2" />

    <title>Speak &amp; Shine 🗣️</title>

    <!-- Preconnect to external origins to reduce DNS/TLS latency -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- MediaPipe Selfie Segmentation - DISABLED due to CSP restrictions -->
    <!-- Uncomment this line after adding https://cdn.jsdelivr.net to your CSP policy -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation@0.1.1675465747/selfie_segmentation.js" crossorigin="anonymous"></script> -->

    <!-- Non-blocking font load: display=swap shows system font immediately,
         swaps to Inter once loaded — eliminates render-blocking -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
          rel="stylesheet" media="print" onload="this.media='all'" />
    <!-- Fallback for no-JS -->
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    </noscript>

    <!-- Inline critical CSS: background + text color so the page isn't blank white during load -->
    <style>
      body { background: #05050f; color: #f0f0ff; margin: 0; }
      #root { min-height: 100vh; }
      /* Skeleton spinner shown before React mounts */
      .initial-loader {
        display: flex; align-items: center; justify-content: center;
        height: 100vh; background: #05050f;
      }
      .initial-loader::after {
        content: ""; width: 36px; height: 36px; border-radius: 50%;
        border: 3px solid #1c1c3e; border-top-color: #8b5cf6;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"><div class="initial-loader"></div></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
